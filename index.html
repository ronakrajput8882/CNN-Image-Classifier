<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #050810;
    --surface: #0c1220;
    --border: #1a2540;
    --accent: #00f5c8;
    --accent2: #6c63ff;
    --text: #e8eaf6;
    --muted: #4a5568;
    --danger: #ff4d6d;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid bg ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,200,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,200,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glow orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 500px; height: 500px; background: rgba(108,99,255,.12); top: -150px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(0,245,200,.08); bottom: -100px; left: -100px; }

  /* ── Layout ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeUp .6s ease both;
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,245,200,.08);
    border: 1px solid rgba(0,245,200,.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-top: 12px;
  }

  .badge .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease infinite; }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    background: var(--surface);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .25s, background .25s, transform .2s;
    animation: fadeUp .7s .1s ease both;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(0,245,200,.04), transparent 70%);
    opacity: 0;
    transition: opacity .3s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,245,200,.03);
    transform: translateY(-2px);
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }

  .drop-icon { font-size: 48px; margin-bottom: 16px; display: block; filter: drop-shadow(0 0 12px rgba(0,245,200,.4)); }

  .drop-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }

  .drop-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  #file-input { display: none; }

  /* ── Preview ── */
  .preview-wrap {
    display: none;
    margin-top: 24px;
    animation: fadeUp .4s ease both;
  }

  .preview-wrap.visible { display: flex; gap: 24px; flex-wrap: wrap; }

  .preview-img-box {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }

  .preview-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .img-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(5,8,16,.75);
    backdrop-filter: blur(6px);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-align: center;
    padding: 4px;
  }

  /* ── Predict Button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
    letter-spacing: .05em;
    transition: opacity .2s, transform .2s, box-shadow .2s;
    box-shadow: 0 0 20px rgba(0,245,200,.2);
    margin-top: 20px;
  }

  .btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 0 32px rgba(0,245,200,.35); }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── Loading ── */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(0,245,200,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* ── Results ── */
  .results {
    display: none;
    margin-top: 32px;
    animation: fadeUp .5s ease both;
  }

  .results.visible { display: block; }

  .result-top {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .result-top::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(0,245,200,.04), rgba(108,99,255,.04));
    pointer-events: none;
  }

  .result-emoji { font-size: 56px; line-height: 1; filter: drop-shadow(0 0 16px rgba(0,245,200,.5)); }

  .result-info { flex: 1; }

  .result-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 4px;
  }

  .result-class {
    font-size: 32px;
    font-weight: 800;
    text-transform: capitalize;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-conf {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-top: 4px;
  }

  /* Confidence ring */
  .conf-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .conf-ring svg { transform: rotate(-90deg); }
  .conf-ring .track { fill: none; stroke: var(--border); stroke-width: 6; }
  .conf-ring .fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 201; stroke-dashoffset: 201; transition: stroke-dashoffset 1s ease; }
  .conf-ring .center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Top 3 */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 12px;
  }

  .top3 { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .top3-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .2s;
  }
  .top3-item:first-child { border-color: rgba(0,245,200,.3); }

  .top3-emoji { font-size: 22px; }
  .top3-label { flex: 1; font-size: 15px; font-weight: 600; text-transform: capitalize; }
  .top3-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .top3-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0; transition: width 1s .3s ease; }
  .top3-pct { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 48px; text-align: right; }

  /* All probs */
  .all-probs { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }

  .prob-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color .2s;
  }

  .prob-chip.highlight { border-color: rgba(0,245,200,.4); background: rgba(0,245,200,.04); }
  .prob-chip .chip-name { color: var(--text); text-transform: capitalize; }
  .prob-chip .chip-val { color: var(--accent); }

  /* ── Reset ── */
  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    margin-top: 24px;
    transition: color .2s, border-color .2s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── Footer ── */
  footer {
    margin-top: 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 24px;
    animation: fadeUp .8s .3s ease both;
  }

  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── Error ── */
  .error-box {
    display: none;
    background: rgba(255,77,109,.08);
    border: 1px solid rgba(255,77,109,.3);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    margin-top: 16px;
  }
  .error-box.visible { display: block; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(.7); }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div>
      <div class="logo-tag">// techwithronak</div>
      <h1 class="h1-cnn">CNN Pictures<br/>Classifier</h1>
      <div class="badge"><span class="dot"></span> CIFAR-10 · PyTorch · 75.1% acc</div>
    </div>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <span class="drop-icon">🖼️</span>
    <div class="drop-title">Drop an Picture here</div>
    <div class="drop-sub">or click to select · JPG / PNG / WEBP</div>
    <input type="file" id="file-input" accept="image/*" />
  </div>

  <!-- Preview + button -->
  <div class="preview-wrap" id="preview-wrap">
    <div class="preview-img-box">
      <img id="preview-img" src="" alt="preview" />
      <div class="img-label">32×32 input</div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center;gap:12px;">
      <div style="font-size:14px;color:var(--muted);font-family:var(--mono);" id="file-name-label"></div>
      <button class="btn" id="predict-btn" onclick="predict()">
        <span>⚡</span> Predict
      </button>
      <button class="reset-btn" onclick="reset()">↩ Upload another</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Running inference...</span>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

  <!-- Results -->
  <div class="results" id="results">

    <div class="result-top">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-info">
        <div class="result-label">Prediction</div>
        <div class="result-class" id="res-class"></div>
        <div class="result-conf" id="res-conf"></div>
      </div>
      <div class="conf-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="track" cx="36" cy="36" r="32"/>
          <circle class="fill" id="conf-arc" cx="36" cy="36" r="32"/>
        </svg>
        <div class="center-text" id="conf-center"></div>
      </div>
    </div>

    <div class="section-title">Top 3 Predictions</div>
    <div class="top3" id="top3"></div>

    <div class="section-title">All Class Probabilities</div>
    <div class="all-probs" id="all-probs"></div>

    <button class="reset-btn" onclick="reset()">↩ Try another image</button>
  </div>

  <!-- Footer -->
  <footer>
    <h2>Built by teachwithronak</h2><br>
    <a href="https://github.com/ronakrajput8882" target="_blank">GitHub</a> ·
    <a href="https://www.linkedin.com/in/ronaksinh-rajput8882/" target="_blank">LinkedIn</a> ·
    <a href="https://www.instagram.com/techwithronak" target="_blank">Instagram</a>
  </footer>

</div>

<script>
  const API = "http://localhost:8000";
  let currentFile = null;

  // ── Drag & Drop ──────────────────────────────────────────────────────────
  const dz = document.getElementById("drop-zone");
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag-over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
  dz.addEventListener("drop", e => {
    e.preventDefault();
    dz.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) setFile(file);
  });

  document.getElementById("file-input").addEventListener("change", e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });

  function setFile(file) {
    currentFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById("preview-img").src = url;
    document.getElementById("file-name-label").textContent = `📄 ${file.name}`;
    document.getElementById("preview-wrap").classList.add("visible");
    dz.style.display = "none";
    hideResults();
  }

  // ── Predict ──────────────────────────────────────────────────────────────
  async function predict() {
    if (!currentFile) return;

    const btn = document.getElementById("predict-btn");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error-box");

    btn.disabled = true;
    loading.classList.add("visible");
    errorBox.classList.remove("visible");
    hideResults();

    const form = new FormData();
    form.append("file", currentFile);

    try {
      const resp = await fetch(`${API}/predict`, { method: "POST", body: form });
      if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
      const data = await resp.json();
      showResults(data);
    } catch (err) {
      errorBox.textContent = `❌ ${err.message} — Make sure app.py is running on port 8000.`;
      errorBox.classList.add("visible");
    } finally {
      btn.disabled = false;
      loading.classList.remove("visible");
    }
  }

  // ── Show Results ─────────────────────────────────────────────────────────
  function showResults(data) {
    document.getElementById("res-emoji").textContent = data.emoji;
    document.getElementById("res-class").textContent = data.prediction;
    document.getElementById("res-conf").textContent = `Confidence: ${data.confidence}%`;

    // Confidence ring
    const arc = document.getElementById("conf-arc");
    const circ = 2 * Math.PI * 32;
    const offset = circ - (data.confidence / 100) * circ;
    setTimeout(() => { arc.style.strokeDashoffset = offset; }, 50);
    document.getElementById("conf-center").innerHTML =
      `<span>${data.confidence}%</span>`;

    // Top 3
    const top3El = document.getElementById("top3");
    top3El.innerHTML = data.top3.map(p => `
      <div class="top3-item">
        <span class="top3-emoji">${p.emoji}</span>
        <span class="top3-label">${p.label}</span>
        <div class="top3-bar-wrap"><div class="top3-bar" data-pct="${p.confidence}"></div></div>
        <span class="top3-pct">${p.confidence}%</span>
      </div>`).join("");

    setTimeout(() => {
      document.querySelectorAll(".top3-bar").forEach(b => {
        b.style.width = b.dataset.pct + "%";
      });
    }, 100);

    // All probs
    const allEl = document.getElementById("all-probs");
    allEl.innerHTML = Object.entries(data.all_probs)
      .sort((a, b) => b[1] - a[1])
      .map(([cls, pct]) => `
        <div class="prob-chip ${cls === data.prediction ? 'highlight' : ''}">
          <span class="chip-name">${cls}</span>
          <span class="chip-val">${pct}%</span>
        </div>`).join("");

    document.getElementById("results").classList.add("visible");
  }

  function hideResults() {
    document.getElementById("results").classList.remove("visible");
    document.getElementById("conf-arc").style.strokeDashoffset = 201;
  }

  function reset() {
    currentFile = null;
    document.getElementById("file-input").value = "";
    document.getElementById("preview-wrap").classList.remove("visible");
    dz.style.display = "";
    hideResults();
    document.getElementById("error-box").classList.remove("visible");
    document.getElementById("loading").classList.remove("visible");
  }
</script>
</body>
</html>
